# ============================================================
# Mosquitto — Lima Smart Core City Fase 1
# Autenticación habilitada (usuario + contraseña)
# ============================================================

listener 1883 0.0.0.0

# Fase 1: Autenticación obligatoria
allow_anonymous false
password_file mosquitto_passwd.txt

# Tamaño máximo de mensaje para imágenes QVGA (~40 KB)
max_packet_size 65536

# Log básico (útil para debug)
log_type error
log_type warning
log_type notice
